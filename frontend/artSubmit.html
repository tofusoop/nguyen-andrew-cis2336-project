<!DOCTYPE html>
<html lang="en">
<head>
    <title>Submit Art - Art Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" style="display: inline-block; max-width: 320px; vertical-align: middle;">
            <img src="images/logo.jpg" alt="Art Connect Gallery Logo" style="width: 100%; height: auto; display: block;">
        </a>
        <h1>Submit Your Artwork</h1>
    </header>
    
    <nav id="main_nav">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="events.html">Events</a>
        <a href="artSubmit.html">Submit Art</a>
        <a href="FAQ.html">FAQ</a>
        <a href="references.html">Reference</a>
    </nav>

    <form id="artSubmitForm">
        <label for="title">Artwork Title:</label>
        <input type="text" id="title" name="title" required><br><br>

        <label for="artist">Artist Name:</label>
        <input type="text" id="artist" name="artist" required><br><br>

        <label for="artistemail">Artist Email:</label>
        <input 
        type="email" 
        id="artistemail" 
        name="artistemail" 
        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" 
        title="Please enter a valid email address (e.g., artist@example.com)" required><br>

        <label for="category">Category:</label>
        <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="painting">Painting</option>
            <option value="sculpture">Sculpture</option>
            <option value="photography">Photography</option>
            <option value="digital">Digital Art</option>
        </select><br><br>

        <label for="price">Price (USD):</label>
        <input 
         type="text" 
        id="price" 
        name="price" 
        inputmode="decimal" 
        oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/^(\d*\.?\d{0,2}).*$/, '$1')" 
        placeholder="0.00" required>


        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="50" required></textarea><br><br>

        <label for="image">Upload Image:</label>
        <input type="file" id="image" name="image" accept="image/*" required><br><br>

        <input type="submit" value="Submit Artwork">
    



    <footer>
        <p>&copy; 2024 Art Connect. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
